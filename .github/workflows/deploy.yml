# Deploy this plugin to the WordPress.org directory (SVN) when a GitHub Release is published.
#
# One-time prerequisites:
#   1. The plugin must already be APPROVED on WordPress.org (the SVN repo must exist).
#   2. Add repository secrets SVN_USERNAME and SVN_PASSWORD (your WordPress.org login).
#   3. Tag the release exactly as the version (e.g. 7.4.2) so it matches "Stable tag" in readme.txt.
#
# Docs: https://github.com/10up/action-wordpress-plugin-deploy
name: Deploy to WordPress.org

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: WordPress.org plugin deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: bizuno-payments-for-woocommerce

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: bizuno-payments-for-woocommerce
          path: ${{ steps.deploy.outputs.zip-path }}
