# Sync readme.txt and the /assets images (screenshots, banner, icon) to WordPress.org
# whenever they change on main -- no version bump or release required.
# Requires the same SVN_USERNAME / SVN_PASSWORD secrets and an approved plugin.
#
# Docs: https://github.com/10up/action-wordpress-plugin-asset-update
name: Update WordPress.org assets & readme

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'readme.txt'

jobs:
  assets:
    name: Update WordPress.org assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update assets & readme
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: bizuno-payments-for-woocommerce
          ASSETS_DIR: assets
